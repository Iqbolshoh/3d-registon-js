<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Samarqand | Registon Madrasalari</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Title overlay -->
    <div class="title-overlay">
        <h1>🕌 REGISTON · SAMARQAND</h1>
        <p>Uch madrasa — uch durdona | 3D Interactive Experience</p>
    </div>

    <!-- Info panel -->
    <div class="info-panel">
        🖱️ Sichqoncha bilan aylantiring | 🔍 Zoom uchun skroll
    </div>

    <!-- Instructions -->
    <div class="instructions">
        ✨ Madrasalarni bosing — ma'lumot olasiz
    </div>

    <!-- Modal oyna -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Ulug'bek Madrasasi</h2>
            <p id="modalText">1420-yilda qurilgan. O'rta asrlarning eng buyuk astronomi Ulug'bek tomonidan qurdirilgan.</p>
            <button class="close-modal" onclick="closeModal()">Yopish ✖</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="script.js"></script>
</body>
</html>
